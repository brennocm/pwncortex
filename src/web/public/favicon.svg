  <!-- Edges -->
  <line x1="16" y1="13" x2="8"  y2="22" stroke="#c79800" stroke-width="1.2" stroke-opacity="0.55"/>
  <line x1="16" y1="13" x2="24" y2="22" stroke="#c79800" stroke-width="1.2" stroke-opacity="0.55"/>
  <line x1="16" y1="13" x2="16" y2="5"  stroke="#c79800" stroke-width="1.2" stroke-opacity="0.55"/>
  <line x1="16" y1="13" x2="26" y2="11" stroke="#c79800" stroke-width="1.2" stroke-opacity="0.55"/>

  <!-- Satellite nodes -->
  <circle cx="16" cy="5"  r="2.2" fill="#c79800" fill-opacity="0.75"/>
  <circle cx="8"  cy="22" r="2.2" fill="#c79800" fill-opacity="0.75"/>
